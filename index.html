<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6f8;color:#1a1a2e;min-height:100vh}
header{background:#1a1a2e;color:#fff;padding:1rem 1.5rem;padding-top:max(1rem,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:-webkit-sticky;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:600;letter-spacing:.02em}
header span{font-size:12px;color:#8b9bb4}
.container{max-width:980px;margin:0 auto;padding:1.5rem;-webkit-overflow-scrolling:touch}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.tab{padding:7px 16px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#6b7280;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tab:hover{border-color:#1a1a2e;color:#1a1a2e}
.tab.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.tab.special{border-color:#6366f1;color:#6366f1}
.tab.special.active{background:#6366f1;border-color:#6366f1;color:#fff}
.panel{display:none}.panel.active{display:block}
.sub-header{margin-bottom:1rem}
.sub-header h2{font-size:18px;font-weight:600;color:#1a1a2e}
.sub-header p{font-size:13px;color:#6b7280;margin-top:2px}
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 16px}
.stat-label{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700}
.stat-val.green{color:#16a34a}
.stat-val.red{color:#dc2626}
.stat-val.amber{color:#d97706}
.progress-bar{height:5px;border-radius:3px;background:#f3f4f6;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.section-label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:1.25rem}
.classes-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-bottom:.5rem}
.cls-cell{border:1.5px solid #e5e7eb;border-radius:8px;padding:6px 4px;text-align:center;cursor:pointer;background:#fff;transition:border-color .15s,transform .1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.cls-cell:hover{border-color:#1a1a2e;transform:translateY(-1px)}
.cls-cell.attended{border-color:#16a34a;background:#f0fdf4}
.cls-cell.missed{border-color:#dc2626;background:#fef2f2}
.cls-num{font-size:10px;color:#9ca3af;margin-bottom:3px}
.cls-dot{width:20px;height:20px;border-radius:50%;margin:0 auto 3px;border:1.5px solid #d1d5db;background:#f9fafb}
.cls-cell.attended .cls-dot{background:#16a34a;border-color:#15803d}
.cls-cell.missed .cls-dot{background:#dc2626;border-color:#b91c1c}
.cls-date{font-size:9px;color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.divider{height:1px;background:#e5e7eb;margin:1.5rem 0}
.add-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border:1.5px dashed #d1d5db;border-radius:8px;background:#fff;color:#6b7280;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.add-btn:hover{border-color:#1a1a2e;color:#1a1a2e}
table.tests{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}
table.tests th{text-align:left;font-size:11px;font-weight:600;color:#6b7280;padding:9px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb;text-transform:uppercase;letter-spacing:.04em}
table.tests td{padding:10px 12px;border-bottom:1px solid #f3f4f6;color:#1a1a2e;vertical-align:top}
table.tests tr:last-child td{border-bottom:none}
table.tests tr:hover td{background:#fafafa}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.03em}
.badge.group{background:#eff6ff;color:#1d4ed8}
.badge.individual{background:#f5f3ff;color:#7c3aed}
.badge.test{background:#fef9c3;color:#854d0e}
.badge.project{background:#dcfce7;color:#15803d}
.del-btn{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:14px;padding:2px 6px;border-radius:4px;transition:color .15s}
.del-btn:hover{color:#dc2626}
.empty-tests{text-align:center;padding:2rem;color:#9ca3af;font-size:13px}
/* All-subjects overview table */
.overview-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;font-size:13px}
.overview-table th{text-align:left;font-size:11px;font-weight:600;color:#6b7280;padding:10px 14px;background:#f9fafb;border-bottom:1px solid #e5e7eb;text-transform:uppercase;letter-spacing:.04em}
.overview-table td{padding:12px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.overview-table tr:last-child td{border-bottom:none}
.overview-table tr:hover td{background:#fafafa}
.mini-bar{height:6px;border-radius:3px;background:#f3f4f6;width:100px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px}
.mini-fill{height:100%;border-radius:3px}
/* Next classes */
.next-day-group{margin-bottom:1.5rem}
.next-day-label{font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.today-badge{background:#6366f1;color:#fff;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.next-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px}
.next-card.today-card{border-color:#6366f1;background:#fafafe}
.next-time{font-size:12px;font-weight:600;color:#6366f1;min-width:90px}
.next-subj{font-size:14px;font-weight:600;color:#1a1a2e}
.next-sub{font-size:12px;color:#9ca3af;margin-top:1px}
.next-status{margin-left:auto;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.next-status.ok{background:#f0fdf4;color:#16a34a}
.next-status.warn{background:#fef9c3;color:#854d0e}
.next-status.danger{background:#fef2f2;color:#dc2626}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:340px;max-width:calc(100vw - 2rem);box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.modal h3 button{background:none;border:none;font-size:20px;cursor:pointer;color:#9ca3af;line-height:1}
.modal label{font-size:12px;font-weight:500;color:#374151;display:block;margin-top:12px;margin-bottom:4px}
.modal input,.modal select,.modal textarea{width:100%;font-size:16px;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;color:#1a1a2e;background:#fff;font-family:inherit;outline:none;transition:border-color .15s}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#1a1a2e}
.modal textarea{resize:vertical;min-height:60px}
.btn-row{display:flex;gap:8px;margin-top:1.25rem}
.btn{padding:8px 18px;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;border:1.5px solid #e5e7eb;background:#fff;color:#374151;transition:all .15s;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:hover{border-color:#1a1a2e}
.btn.primary{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.btn.primary:hover{background:#2d2d4e}
.status-row{display:flex;gap:8px;margin-top:4px}
.status-opt{flex:1;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.status-opt:hover{border-color:#374151}
.status-opt.sel-attended{background:#f0fdf4;border-color:#16a34a;color:#15803d}
.status-opt.sel-missed{background:#fef2f2;border-color:#dc2626;color:#b91c1c}
.status-opt.sel-none{background:#f9fafb;border-color:#1a1a2e;color:#1a1a2e}
@media(max-width:600px){
  .summary-bar{grid-template-columns:repeat(2,1fr)}
  .classes-grid{grid-template-columns:repeat(5,1fr)}
  .mini-bar{display:none}
}
</style>
</head>

<header>
  <h1>📋 Term 4 Attendance Tracker</h1>
  <span>MDI Gurgaon · PGDM</span>
</header>
<div class="container">
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<!-- Class modal -->
<div class="modal-overlay hidden" id="cls-overlay">
  <div class="modal">
    <h3 id="cls-modal-title">Class #1 <button onclick="closeCls()">×</button></h3>
    <label>Status</label>
    <div class="status-row">
      <div class="status-opt" id="opt-attended" onclick="setStatus('attended')">✅ Attended</div>
      <div class="status-opt" id="opt-missed" onclick="setStatus('missed')">❌ Missed</div>
      <div class="status-opt" id="opt-none" onclick="setStatus('')">— None</div>
    </div>
    <label>Date</label>
    <input type="date" id="cls-date">
    <label>Notes (optional)</label>
    <input type="text" id="cls-notes" placeholder="e.g. guest lecture, proxy">
    <div class="btn-row">
      <button class="btn primary" onclick="saveCls()">Save</button>
      <button class="btn" onclick="closeCls()">Cancel</button>
    </div>
  </div>
</div>

<!-- Test/Project modal -->
<div class="modal-overlay hidden" id="test-overlay">
  <div class="modal">
    <h3 id="test-modal-title">Add item <button onclick="closeTest()">×</button></h3>
    <label>Type</label>
    <select id="t-type">
      <option value="test">Class test</option>
      <option value="project">Project</option>

    <label>Notes</label>

    <div class="btn-row">
      <button class="btn primary" onclick="saveTest()">Save</button>
      <button class="btn" onclick="closeTest()">Cancel</button>
    </div>
  </div>
</div>

<script>
const SUBJECTS=[
  {id:'sm2b',code:'SM-II(B)',name:'Strategic Management II (B)',slot:'Mon & Wed · 10:15–11:45 AM',days:[1,3],time:'10:15–11:45 AM',timeStart:'10:15',location:'Auditorium, Room A-1'},
  {id:'nms_c',code:'NMS (C)',name:'NMS',slot:'Mon & Fri · 12:00–1:30 PM',days:[1,5],time:'12:00–1:30 PM',timeStart:'12:00',location:'Gurukula Building, Room G-14'},
  {id:'fmib',code:'FMIB',name:'Financial Markets & IB',slot:'Mon & Wed · 5:45–7:15 PM',days:[1,3],time:'5:45–7:15 PM',timeStart:'17:45',location:'Gurukula Building, Room G-14'},
  {id:'fma',code:'FM(A)',name:'Financial Management (A)',slot:'Tue & Thu · 10:15–11:45 AM',days:[2,4],time:'10:15–11:45 AM',timeStart:'10:15',location:'Gurukula Building, Room G-12'},
  {id:'imb',code:'IM(B)',name:'Investment Management (B)',slot:'Tue & Thu · 12:00–1:30 PM',days:[2,4],time:'12:00–1:30 PM',timeStart:'12:00',location:'Auditorium, Room A-1'},
  {id:'iba',code:'IB(A)',name:'International Business (A)',slot:'Wed & Fri · 2:15–3:45 PM',days:[3,5],time:'2:15–3:45 PM',timeStart:'14:15',location:'Gurukula Building, Room G-12'},
];
const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TOTAL=20, REQUIRED=16;
const KEY='mdi_term4_v3';

function loadState(){
  try{const raw=localStorage.getItem(KEY);if(raw)return JSON.parse(raw);}catch(e){}
  const s={};
  SUBJECTS.forEach(sub=>{s[sub.id]={classes:Array.from({length:TOTAL},(_,i)=>({n:i+1,status:'',date:'',notes:''})),tests:[]};});
  return s;
}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
let state=loadState();
let curSub=null,curCls=null,curTestSub=null,curStatus='';

/* Build tabs */
const tabsEl=document.getElementById('tabs');
const panelsEl=document.getElementById('panels');

// Special: All Classes tab
(function(){
  const t=document.createElement('button');
  t.className='tab special active';
  t.textContent='📊 All Classes';
  t.onclick=()=>switchTab('__all__');
  t.id='tab-__all__';
  tabsEl.appendChild(t);
  const p=document.createElement('div');
  p.className='panel active';
  p.id='panel-__all__';
  panelsEl.appendChild(p);
})();

// Special: Next Classes tab
(function(){
  const t=document.createElement('button');
  t.className='tab special';
  t.textContent='📅 Next Classes';
  t.onclick=()=>switchTab('__next__');
  t.id='tab-__next__';
  tabsEl.appendChild(t);
  const p=document.createElement('div');
  p.className='panel';
  p.id='panel-__next__';
  panelsEl.appendChild(p);
})();

SUBJECTS.forEach(s=>{
  const t=document.createElement('button');
  t.className='tab';
  t.textContent=s.code;
  t.onclick=()=>switchTab(s.id);
  t.id='tab-'+s.id;
  tabsEl.appendChild(t);
  const p=document.createElement('div');
  p.className='panel';
  p.id='panel-'+s.id;
  panelsEl.appendChild(p);
});

const ALL_IDS=['__all__','__next__',...SUBJECTS.map(s=>s.id)];

function switchTab(id){
  ALL_IDS.forEach(tid=>{
    const tab=document.getElementById('tab-'+tid);
    const panel=document.getElementById('panel-'+tid);
    if(tab) tab.classList.toggle('active',tid===id);
    if(panel) panel.classList.toggle('active',tid===id);
  });
  if(id==='__all__') renderAll();
  else if(id==='__next__') renderNext();
}

/* Render All Classes overview */
function renderAll(){
  let totalAtt=0,totalMis=0;
  SUBJECTS.forEach(s=>{
    totalAtt+=state[s.id].classes.filter(c=>c.status==='attended').length;
    totalMis+=state[s.id].classes.filter(c=>c.status==='missed').length;
  });
  const grandTotal=SUBJECTS.length*TOTAL;
  const grandPct=Math.round((totalAtt/grandTotal)*100);

  let rows='';
  SUBJECTS.forEach(s=>{
    const d=state[s.id];
    const att=d.classes.filter(c=>c.status==='attended').length;
    const mis=d.classes.filter(c=>c.status==='missed').length;
    const rem=Math.max(0,REQUIRED-att);
    const canMiss=Math.max(0,TOTAL-att-mis-(REQUIRED-att));
    const pct=Math.round((att/TOTAL)*100);
    const statusColor=rem===0?'#16a34a':rem<=4?'#d97706':'#dc2626';
    rows+=`<tr style="cursor:pointer" onclick="switchTab('${s.id}')">
      <td><strong>${s.code}</strong><br><span style="color:#9ca3af;font-size:11px">${s.name}</span></td>
      <td><span style="color:#16a34a;font-weight:700">${att}</span> / ${TOTAL}
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%;background:#16a34a"></div></div>
      </td>
      <td style="color:#dc2626;font-weight:600">${mis}</td>
      <td style="color:${statusColor};font-weight:700">${rem===0?'✓ Done':rem+' more'}</td>
      <td style="color:${canMiss===0?'#dc2626':canMiss<=2?'#d97706':'#1a1a2e'};font-weight:600">${canMiss}</td>
      <td style="font-size:11px;color:#9ca3af">${s.slot}</td>
    </tr>`;
  });

  document.getElementById('panel-__all__').innerHTML=`
    <div class="sub-header">
      <h2>All subjects overview</h2>
      <p>Click any row to go to that subject's detail</p>
    </div>
    <div class="summary-bar">
      <div class="stat"><div class="stat-label">Total attended</div><div class="stat-val green">${totalAtt} <span style="font-size:14px;color:#9ca3af">/ ${grandTotal}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${grandPct}%;background:#16a34a"></div></div></div>
      <div class="stat"><div class="stat-label">Total missed</div><div class="stat-val red">${totalMis}</div></div>
      <div class="stat"><div class="stat-label">Subjects on track</div><div class="stat-val green">${SUBJECTS.filter(s=>state[s.id].classes.filter(c=>c.status==='attended').length>=REQUIRED).length} / ${SUBJECTS.length}</div></div>
      <div class="stat"><div class="stat-label">At risk</div><div class="stat-val ${SUBJECTS.filter(s=>{const d=state[s.id];const att=d.classes.filter(c=>c.status==='attended').length;const mis=d.classes.filter(c=>c.status==='missed').length;return TOTAL-mis<REQUIRED&&att<REQUIRED;}).length>0?'red':'green'}">${SUBJECTS.filter(s=>{const d=state[s.id];const att=d.classes.filter(c=>c.status==='attended').length;const mis=d.classes.filter(c=>c.status==='missed').length;return TOTAL-mis<REQUIRED&&att<REQUIRED;}).length}</div></div>
    </div>
    <table class="tests" style="border-radius:12px">
      <thead><tr><th>Subject</th><th>Attended</th><th>Missed</th><th>Still need</th><th>Can miss</th><th>Schedule</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

/* Render Next Classes */
function renderNext(){
  const now=new Date();
  const todayDay=now.getDay();
  const todayHHMM=now.getHours()*60+now.getMinutes();

  // Build next 7 days of classes
  const upcoming=[];
  for(let offset=0;offset<8;offset++){
    const d=new Date(now);
    d.setDate(d.getDate()+offset);
    const dayOfWeek=d.getDay();
    SUBJECTS.forEach(s=>{
      if(s.days.includes(dayOfWeek)){
        const [h,m]=s.timeStart.split(':').map(Number);
        const classMin=h*60+m;
        if(offset===0&&classMin<todayHHMM) return; // past today
        upcoming.push({subj:s,date:new Date(d),dayOfWeek,time:s.time,offset});
      }
    });
  }
  // Sort by date then time
  upcoming.sort((a,b)=>{
    const da=a.date.setHours(0,0,0,0),db=b.date.setHours(0,0,0,0);
    if(da!==db) return da-db;
    return a.subj.timeStart.localeCompare(b.subj.timeStart);
  });

  // Group by date
  const groups={};
  upcoming.forEach(u=>{
    const key=u.date.toDateString();
    if(!groups[key]) groups[key]={date:u.date,items:[]};
    groups[key].items.push(u);
  });

  let html='';
  const todayStr=now.toDateString();
  const tomorrowStr=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1).toDateString();
  Object.values(groups).slice(0,6).forEach(g=>{
    const isToday=g.date.toDateString()===todayStr;
    const isTomorrow=g.date.toDateString()===tomorrowStr;
    const dateLabel=isToday?'Today':isTomorrow?'Tomorrow':DAY_FULL[g.date.getDay()]+', '+g.date.getDate()+'/'+(g.date.getMonth()+1);
    html+=`<div class="next-day-group">
      <div class="next-day-label">${dateLabel}${isToday?'<span class="today-badge">Today</span>':''}</div>`;
    g.items.forEach(u=>{
      const d=state[u.subj.id];
      const att=d.classes.filter(c=>c.status==='attended').length;
      const mis=d.classes.filter(c=>c.status==='missed').length;
      const canMiss=Math.max(0,TOTAL-att-mis-(REQUIRED-att));
      let statusLabel='',statusClass='';
      if(att>=REQUIRED){statusLabel='Attendance cleared';statusClass='ok';}
      else if(canMiss===0){statusLabel='Cannot miss!';statusClass='danger';}
      else if(canMiss<=2){statusLabel='Only '+canMiss+' left to miss';statusClass='warn';}
      else{statusLabel=canMiss+' misses left';statusClass='ok';}
      html+=`<div class="next-card${isToday?' today-card':''}" onclick="switchTab('${u.subj.id}')" style="cursor:pointer">
        <div class="next-time">${u.subj.time}</div>
        <div><div class="next-subj">${u.subj.code}</div><div class="next-sub">${u.subj.name}</div><div class="next-sub">📍 ${u.subj.location}</div></div>
        <div class="next-status ${statusClass}">${statusLabel}</div>
      </div>`;
    });
    html+='</div>';
  });

  if(!html) html='<div style="text-align:center;padding:3rem;color:#9ca3af;font-size:14px">No upcoming classes in the next 7 days.</div>';

  document.getElementById('panel-__next__').innerHTML=`
    <div class="sub-header">
      <h2>Upcoming classes</h2>
      <p>Next 7 days · click any class to view details · attendance status shown live</p>
    </div>
    ${html}
  `;
}

function renderPanel(id){
  const s=SUBJECTS.find(x=>x.id===id);
  const d=state[id];
  const att=d.classes.filter(c=>c.status==='attended').length;
  const mis=d.classes.filter(c=>c.status==='missed').length;
  const rem=Math.max(0,REQUIRED-att);
  const canMiss=Math.max(0,TOTAL-att-mis-(REQUIRED-att));
  const pct=Math.round((att/TOTAL)*100);
  const midCls=d.classes.slice(0,10);
  const endCls=d.classes.slice(10,20);

  let testsRows='';
  d.tests.forEach((t,ti)=>{
    testsRows+=`<tr>
      <td><span class="badge ${t.type}">${t.type==='project'?'Project':'Test'}</span></td>
      <td><strong>${escH(t.title||'—')}</strong>${t.notes?`<br><span style="color:#6b7280;font-size:11px">${escH(t.notes)}</span>`:''}</td>
      <td>${escH(t.date||'—')}</td>
      <td><span class="badge ${t.group}">${t.group}</span>${t.members?`<br><span style="color:#6b7280;font-size:10px">${escH(t.members)}</span>`:''}</td>
      <td>${escH(t.marks||'—')}</td>
      <td><button class="del-btn" onclick="delTest('${id}',${ti})">✕</button></td>
    </tr>`;
  });

  document.getElementById('panel-'+id).innerHTML=`
    <div class="sub-header">
      <h2>${s.name}</h2>
      <p>${s.slot} · ${s.location} · ${TOTAL} classes total · need ${REQUIRED} to clear</p>
    </div>
    <div class="summary-bar">
      <div class="stat"><div class="stat-label">Attended</div><div class="stat-val green">${att} <span style="font-size:14px;color:#9ca3af">/ ${TOTAL}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:#16a34a"></div></div></div>
      <div class="stat"><div class="stat-label">Missed</div><div class="stat-val red">${mis}</div></div>
      <div class="stat"><div class="stat-label">Still need</div><div class="stat-val ${rem===0?'green':rem<=3?'amber':'red'}">${rem}</div></div>
      <div class="stat"><div class="stat-label">Can still miss</div><div class="stat-val ${canMiss===0?'red':canMiss<=3?'amber':''}">${canMiss}</div></div>
    </div>
    <div class="section-label">Pre-mid term — classes 1 to 10</div>
    <div class="classes-grid">${midCls.map(c=>cellHTML(c,id)).join('')}</div>
    <div class="section-label" style="margin-top:1rem">Post-mid term — classes 11 to 20</div>
    <div class="classes-grid">${endCls.map(c=>cellHTML(c,id)).join('')}</div>
    <div class="divider"></div>
    <div class="tests-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="section-label" style="margin:0">Class tests & projects</div>
        <button class="add-btn" onclick="openTest('${id}')">+ Add test / project</button>
      </div>
      ${d.tests.length?`<table class="tests"><thead><tr><th>Type</th><th>Title</th><th>Date</th><th>Group?</th><th>Marks</th><th></th></tr></thead><tbody>${testsRows}</tbody></table>`:`<div class="empty-tests">No tests or projects added yet.</div>`}
    </div>
  `;
}

function cellHTML(c,sid){
  return `<div class="${c.status?'cls-cell '+c.status:'cls-cell'}" onclick="openCls('${sid}',${c.n-1})">
    <div class="cls-num">${c.n}</div>
    <div class="cls-dot"></div>
    <div class="cls-date">${c.date?fmtDate(c.date):''}</div>
  </div>`;
}
function fmtDate(d){if(!d)return '';const[y,m,day]=d.split('-');return `${day}/${m}`;}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function openCls(sid,idx){
  curSub=sid;curCls=idx;
  const c=state[sid].classes[idx];
  const s=SUBJECTS.find(x=>x.id===sid);
  document.getElementById('cls-modal-title').innerHTML=`${s.code} · Class #${idx+1} <button onclick="closeCls()">×</button>`;
  setStatus(c.status||'');
  document.getElementById('cls-date').value=c.date||'';
  document.getElementById('cls-notes').value=c.notes||'';
  document.getElementById('cls-overlay').classList.remove('hidden');
}
function setStatus(v){
  curStatus=v;
  if(v==='attended') document.getElementById('opt-attended').className='status-opt sel-attended';
  else document.getElementById('opt-attended').className='status-opt';
  if(v==='missed') document.getElementById('opt-missed').className='status-opt sel-missed';
  else document.getElementById('opt-missed').className='status-opt';
  if(!v) document.getElementById('opt-none').className='status-opt sel-none';
  else document.getElementById('opt-none').className='status-opt';
}
function closeCls(){document.getElementById('cls-overlay').classList.add('hidden');}
function saveCls(){
  const c=state[curSub].classes[curCls];
  c.status=curStatus;c.date=document.getElementById('cls-date').value;c.notes=document.getElementById('cls-notes').value;
  save();closeCls();renderPanel(curSub);
  // refresh special tabs if active
  if(document.getElementById('panel-__all__').classList.contains('active')) renderAll();
  if(document.getElementById('panel-__next__').classList.contains('active')) renderNext();
}

function openTest(sid){
  curTestSub=sid;
  const s=SUBJECTS.find(x=>x.id===sid);
  document.getElementById('test-modal-title').innerHTML=`Add item — ${s.code} <button onclick="closeTest()">×</button>`;
  ['t-type','t-title','t-date','t-marks','t-members','t-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-group').value='individual';
  document.getElementById('members-wrap').style.display='none';
  document.getElementById('test-overlay').classList.remove('hidden');
}
function closeTest(){document.getElementById('test-overlay').classList.add('hidden');}
function toggleMembers(){document.getElementById('members-wrap').style.display=document.getElementById('t-group').value==='group'?'block':'none';}
function saveTest(){
  state[curTestSub].tests.push({
    type:document.getElementById('t-type').value,
    title:document.getElementById('t-title').value,
    date:document.getElementById('t-date').value,
    group:document.getElementById('t-group').value,
    members:document.getElementById('t-members').value,
    marks:document.getElementById('t-marks').value,
    notes:document.getElementById('t-notes').value,
  });
  save();closeTest();renderPanel(curTestSub);
}
function delTest(sid,ti){if(confirm('Delete this entry?')){state[sid].tests.splice(ti,1);save();renderPanel(sid);}}

document.getElementById('cls-overlay').addEventListener('click',function(e){if(e.target===this)closeCls();});
document.getElementById('test-overlay').addEventListener('click',function(e){if(e.target===this)closeTest();});

// Init
SUBJECTS.forEach(s=>renderPanel(s.id));
renderAll();
</script>
</body>
</html>
